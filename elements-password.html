<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>色彩三要素最後驗收</title>
  <style>
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background: linear-gradient(135deg, #f8f3ff 0%, #fff8df 50%, #eef8ff 100%);
      color: #10214a;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1, h2, p { margin: 0; }

    h1 {
      font-size: clamp(28px, 4vw, 48px);
      color: #4d368f;
      letter-spacing: 0;
    }

    .stage-label {
      border-radius: 999px;
      padding: 10px 18px;
      background: #4d368f;
      color: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .panel {
      display: grid;
      gap: 20px;
      padding: clamp(18px, 3vw, 28px);
      border: 3px solid #7b61c7;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 16px 38px rgba(16, 33, 74, 0.14);
    }

    .reward-layout,
    .challenge-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 24px;
      align-items: center;
    }

    .reward-image,
    .challenge-image {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(16, 33, 74, 0.12);
    }

    .control-panel {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .prompt {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.5;
    }

    input {
      width: 100%;
      min-height: 56px;
      border: 2px solid #9a82e7;
      border-radius: 8px;
      padding: 12px 14px;
      color: #10214a;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
      background: #fff;
    }

    input:focus {
      outline: 4px solid rgba(255, 203, 69, 0.42);
      border-color: #ff9f1c;
    }

    button,
    .link-button {
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      background: #ff9f1c;
      color: #17120a;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 8px 18px rgba(16, 33, 74, 0.16);
    }

    .message {
      min-height: 32px;
      font-size: 18px;
      font-weight: 900;
    }

    .success { color: #14843b; }
    .error { color: #c62828; }
    .hidden { display: none; }

    @media (max-width: 820px) {
      main { width: min(100% - 20px, 620px); }
      .topbar,
      .reward-layout,
      .challenge-layout { grid-template-columns: 1fr; }
      .topbar { align-items: start; }
      .stage-label { width: fit-content; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>色彩三要素最後驗收</h1>
      <div id="stageLabel" class="stage-label">最終封印</div>
    </div>

    <section id="rewardPanel" class="panel">
      <div class="reward-layout">
        <img class="reward-image" src="色彩學開場影片/色彩三要素通關.png" alt="色彩三要素通關圖片">
        <div class="control-panel">
          <p class="prompt">你已收齊色彩三要素三項線索</p>
          <p>按下按鈕後，系統會隨機抽出最後一張色彩三要素認證碼。</p>
          <button id="startChallengeButton" type="button">最後驗收</button>
        </div>
      </div>
    </section>

    <section id="challengePanel" class="panel hidden">
      <div class="challenge-layout">
        <img id="challengeImage" class="challenge-image" src="" alt="色彩三要素認證碼題目">
        <div class="control-panel">
          <h2>最終封印：色彩三要素認證碼</h2>
          <p class="prompt">請依照圖示，輸入對應認證碼。</p>
          <input id="answerInput" type="text" autocomplete="off" inputmode="numeric" aria-label="輸入認證碼">
          <button id="submitAnswerButton" type="button">確認驗收</button>
          <p id="message" class="message" aria-live="polite"></p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素1.png", answers: ["063"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素2.png", answers: ["195"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素3.png", answers: ["247"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素4.png", answers: ["319"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素5.png", answers: ["431"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素6.png", answers: ["592"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素7.png", answers: ["658"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素8.png", answers: ["804"] },
      { image: "解謎圖片/色彩三要素認證碼/色彩三要素9.png", answers: ["926"] }
    ];

    const rewardPanel = document.querySelector("#rewardPanel");
    const challengePanel = document.querySelector("#challengePanel");
    const startChallengeButton = document.querySelector("#startChallengeButton");
    const challengeImage = document.querySelector("#challengeImage");
    const answerInput = document.querySelector("#answerInput");
    const submitAnswerButton = document.querySelector("#submitAnswerButton");
    const message = document.querySelector("#message");
    let currentQuestion = null;

    function normalizeAnswer(value) {
      return value.trim().replace(/\s/g, "");
    }

    function pickQuestion() {
      const lastQuestionId = window.localStorage.getItem("lastElementsQuestion");
      const candidates = questions.filter((question) => question.image !== lastQuestionId);
      const pool = candidates.length ? candidates : questions;
      currentQuestion = pool[Math.floor(Math.random() * pool.length)];
      window.localStorage.setItem("lastElementsQuestion", currentQuestion.image);
      challengeImage.src = currentQuestion.image;
      answerInput.value = "";
      message.textContent = "";
      message.className = "message";
      answerInput.focus();
    }

    function startChallenge() {
      rewardPanel.classList.add("hidden");
      challengePanel.classList.remove("hidden");
      pickQuestion();
    }

    function checkAnswer() {
      const value = normalizeAnswer(answerInput.value);
      const accepted = currentQuestion.answers.map(normalizeAnswer);

      if (!value) {
        message.textContent = "請先輸入認證碼。";
        message.className = "message error";
        answerInput.focus();
        return;
      }

      if (!accepted.includes(value)) {
        message.textContent = "還沒有解封成功，請再對照圖片線索。";
        message.className = "message error";
        answerInput.select();
        return;
      }

      message.textContent = "最後封印解開成功。";
      message.className = "message success";
      window.setTimeout(() => {
          window.location.href = "evaluation new0618.html";
      }, 700);
    }

    startChallengeButton.addEventListener("click", startChallenge);
    submitAnswerButton.addEventListener("click", checkAnswer);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") checkAnswer();
    });
  </script>
  <script src="game-timer.js"></script>
</body>
</html>

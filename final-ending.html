<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>完美破關</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background: #070b1d;
    }

    main {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #070b1d;
    }

    img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      background: #070b1d;
    }

  </style>
</head>
<body>
  <main aria-label="完美破關">
    <img src="色彩學開場影片/完美破關3.png" alt="完美破關">
  </main>
</body>
</html>

name: Generate QR codes

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QR generator
        run: python -m pip install "qrcode[pil]"

      - name: Generate student and teacher QR codes
        run: python generate_qr_codes.py

      - name: Upload QR images
        uses: actions/upload-artifact@v4
        with:
          name: color-game-qr
          path: |
            QR/學生版.png
            QR/教師版.png

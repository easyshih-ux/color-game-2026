<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>色彩三要素開場</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background: #070b1d;
    }

    main {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #070b1d;
    }

    img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      background: #070b1d;
    }

    .next-button {
      position: fixed;
      right: clamp(18px, 4vw, 56px);
      bottom: clamp(18px, 5vh, 46px);
      min-height: 56px;
      border: 0;
      border-radius: 999px;
      padding: 14px 26px;
      background: rgba(255, 159, 28, 0.94);
      color: #17120a;
      cursor: pointer;
      font-size: 20px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.28);
    }
  </style>
</head>
<body>
  <main aria-label="色彩三要素開場">
    <img src="色彩學開場影片/色彩三要素01.png" alt="色彩三要素開場">
    <a class="next-button" href="elements-password.html">最後驗收</a>
  </main>
  <script src="game-timer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>第一道封印｜色相：12色相環解鎖</title>
  <style>
    :root {
      --bg: #fff7e8;
      --card: #ffffff;
      --ink: #263238;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #ff9f1c;
      --accent-dark: #d97706;
      --good: #16a34a;
      --bad: #dc2626;
      --lock: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 214, 0, 0.25), transparent 28%),
        radial-gradient(circle at top right, rgba(0, 191, 239, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 0, 168, 0.13), transparent 25%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      padding: 30px 18px 18px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto 48px;
    }

    .progress-card {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 16px 40px rgba(31, 41, 55, 0.08);
      position: sticky;
      top: 8px;
      z-index: 5;
      backdrop-filter: blur(10px);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .step-tab {
      border: 2px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 12px 10px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
      font-weight: 900;
      color: var(--muted);
      min-height: 66px;
      font-family: inherit;
    }

    .step-tab small {
      display: block;
      font-weight: 700;
      margin-top: 4px;
      color: inherit;
      line-height: 1.25;
    }

    .step-tab.active {
      border-color: var(--accent);
      color: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(217, 119, 6, 0.14);
    }

    .step-tab.done {
      border-color: rgba(22, 163, 74, 0.4);
      color: var(--good);
      background: #f0fdf4;
    }

    .step-tab.locked {
      cursor: not-allowed;
      color: var(--lock);
      background: #f3f4f6;
      opacity: 0.78;
    }

    .panel {
      margin-top: 20px;
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 18px 55px rgba(31, 41, 55, 0.11);
      padding: clamp(20px, 3vw, 34px);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .section-title {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    .badge {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-weight: 1000;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 18px rgba(255, 159, 28, 0.25);
      flex-shrink: 0;
    }

    h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
    }

    .hint {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 18px;
      padding: 14px 16px;
      line-height: 1.75;
      margin: 14px 0 22px;
    }

    .question-card,
    .mini-card {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      margin: 14px 0;
    }

    .question {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    label.option {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 2px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.15s;
    }

    label.option:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
    }

    button.primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 8px 18px rgba(255, 159, 28, 0.24);
    }

    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }

    button.ghost {
      background: #fff;
      color: var(--accent-dark);
      border: 2px solid #fed7aa;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
      box-shadow: none;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .feedback {
      min-height: 26px;
      font-weight: 900;
      margin-top: 14px;
      line-height: 1.6;
    }

    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }

    .locked-message {
      text-align: center;
      padding: 60px 20px;
    }

    .locked-message .lock-icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .wheel-area {
      display: grid;
      grid-template-columns: minmax(430px, 1fr) minmax(260px, 330px);
      gap: 24px;
      align-items: start;
    }

    .wheel-bank-side {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      position: sticky;
      top: 118px;
    }

    .wheel {
      position: relative;
      width: min(650px, 100%);
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 50%;
      background: #fffaf2;
      border: 2px dashed #fbbf24;
      box-shadow: inset 0 0 0 18px rgba(255, 247, 237, 0.9);
    }

    .slot {
      position: absolute;
      width: 112px;
      height: 60px;
      border-radius: 18px;
      border: 2px dashed #cbd5e1;
      background: rgba(255,255,255,0.92);
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 900;
      font-size: 14px;
      transform: translate(-50%, -50%);
      transition: 0.15s;
      padding: 4px;
    }

    .slot.over {
      border-color: var(--accent);
      background: #fffbeb;
      transform: translate(-50%, -50%) scale(1.04);
    }

    .slot .slot-label {
      font-size: 15px;
      font-weight: 1000;
      color: #92400e;
      line-height: 1.15;
    }

    .slot .slot-hint {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
      margin-top: 2px;
    }

    .slot .color-chip {
      width: 94px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #111;
      text-shadow: 0 1px 0 rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.12);
      font-size: 13px;
      line-height: 1.2;
      cursor: pointer;
    }

    .slot .color-chip:hover {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px;
      min-height: 180px;
    }

    .palette.grid-bank {

      grid-template-columns: repeat(3, minmax(74px, 1fr));

      align-items: start;

      max-width: 330px;
      margin: 0;
    }

    .palette.grid-bank .draggable {
      width: 100%;
      min-width: 0;
      padding: 10px 8px;
      font-size: 14px;

      padding: 10px 13px;

      text-align: center;
      font-weight: 900;

      box-shadow: 0 6px 14px rgba(31, 41, 55, 0.08);
      color: #111;
      text-shadow: 0 1px 0 rgba(255,255,255,0.72);

    .draggable:active { cursor: grabbing; }

    .drop-zone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;

    .drop-zone {

      border-radius: 22px;
      background: #fff;
      padding: 14px;
      transition: 0.15s;
    }

    .drop-zone.over {
      border-color: var(--accent);
      background: #fffbeb;
    }

    .drop-zone h3 {
      margin: 0 0 10px;
      font-size: 19px;
      text-align: center;
    }

    .drop-items {

    .bank-title {

      color: var(--muted);

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;

    .color-choice {
      cursor: pointer;
      position: relative;
      opacity: 0.95;
      font-family: inherit;
    }

    .color-choice.selected {
      outline: 4px solid var(--accent);
      transform: translateY(-2px);
    }

    .quiz-round {
      border-left: 6px solid var(--accent);
      background: #f9fafb;
      border-radius: 20px;
      padding: 18px;
      margin: 14px 0;

    .score-note {

    .finish {
      text-align: center;

    .finish h2 {

    }

    .finish p {
      color: var(--muted);
      font-size: 19px;

    .stamp {

      border: 4px solid var(--good);
      color: var(--good);
      border-radius: 16px;
      padding: 10px 18px;
      font-weight: 1000;
      font-size: 24px;

    .tiny {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;

    .wheel-round-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
    }

    .mini-wheel-wrap {
      display: flex;
      justify-content: center;
      padding: 8px 0 4px;
    }

    .mini-wheel {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: #fffaf2;
      border: 2px dashed #fbbf24;
      box-shadow: inset 0 0 0 16px rgba(255, 247, 237, 0.92);
      overflow: visible;
      margin: 18px;
    }

    .wheel-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: white;
      border: 2px solid #fde68a;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6px;
      font-weight: 1000;
      color: #92400e;
      line-height: 1.35;
      box-shadow: 0 10px 22px rgba(217, 119, 6, 0.12);
    }

    .wheel-node {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.14);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 1000;
      font-size: 12px;
      line-height: 1.15;
      cursor: pointer;
      color: #111;
      text-shadow: 0 1px 0 rgba(255,255,255,0.75);
      box-shadow: 0 6px 14px rgba(31, 41, 55, 0.10);
      padding: 4px;
      user-select: none;
      font-family: inherit;
    }

    button.wheel-node:hover:not(:disabled),
    button.wheel-node:active:not(:disabled),
    button.wheel-node.selected:hover,
    button.wheel-node.selected:active {
      transform: translate(-50%, -50%);
    }

    .wheel-node.main-target {
      cursor: default;
      z-index: 3;
      opacity: 1;
      transform: translate(-50%, -50%);
      outline: 4px solid #111827;
      outline-offset: 2px;
      box-shadow: 0 6px 14px rgba(31, 41, 55, 0.16);

    .wheel-node.selected {
      z-index: 4;
      outline: 4px solid var(--accent);
      outline-offset: 2px;
      box-shadow: 0 6px 14px rgba(31, 41, 55, 0.10);

    .wheel-node.main-target:hover,

    .round-tip {

      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;

    .selected-card {
      outline: 4px solid var(--accent);

      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(217, 119, 6, 0.18);

    .slot.click-ready,
    .drop-zone.click-ready {
      border-color: var(--accent);
      background: #fffbeb;

    .click-instruction {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      color: #075985;
      border-radius: 18px;
      padding: 12px 14px;

    }

    .mix-guide {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin: 14px 0 20px;
    }

    .guide-card {
      background: #fff;
      border: 1px solid var(--line);

      padding: 12px;

    .formula {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #fff7ed;
      border: 1px solid #fed7aa;

    .mix-lab {

    .mix-target-card,

    .mix-target-swatch {

    .mix-color-explanation {
      margin: 14px 0 8px;

    .paint-buttons {
      display: grid;

    .paint-button {
      border: 3px solid transparent;

    function familyZone(id, title) {
      return `
        <div class="drop-zone" data-family-target="${id}" onclick="placeSelectedFamilyCard(this)">
          <h3>${title}</h3>
          <div class="drop-items"></div>
        </div>
      `;
    }


    window.selectFamilyCard = function(card) {
      if (currentStep !== 2) return;
      selectedFamilyCardEl = card;
      document.querySelectorAll(".mini-card .draggable, .drop-zone .draggable").forEach(item => item.classList.remove("selected-card"));
      card.classList.add("selected-card");
      document.querySelectorAll(".drop-zone").forEach(zone => zone.classList.add("click-ready"));
    };

    window.placeSelectedFamilyCard = function(zone) {
      if (currentStep !== 2 || !selectedFamilyCardEl) return;
      zone.querySelector(".drop-items").appendChild(selectedFamilyCardEl);
      selectedFamilyCardEl.classList.remove("selected-card");
      selectedFamilyCardEl = null;
      document.querySelectorAll(".drop-zone").forEach(item => item.classList.remove("click-ready"));
    };

    window.checkFamilies = function() {
      let wrong = 0;
      let total = 0;

      document.querySelectorAll(".drop-zone").forEach(zone => {
        const target = zone.dataset.familyTarget;
        zone.querySelectorAll(".draggable").forEach(item => {
          total++;
          if (item.dataset.family !== target) wrong++;
        });
      });

      const bankLeft = document.querySelectorAll("#palette .draggable").length;
      const feedback = document.querySelector(".feedback");

      if (bankLeft > 0) {
        feedback.className = "feedback bad";
        feedback.textContent = `還有 ${bankLeft} 張色卡沒有分類喔！`;
        return;
      }

      if (wrong === 0 && total === 12) {
        passStep("色彩家族分類完成！你已經會判斷色系了。");
      } else {
        feedback.className = "feedback bad";
        feedback.textContent = `有 ${wrong} 張色卡跑錯家族囉！請看看它比較接近哪一種主要色相。`;
      }
    };

    function wheelQuestion(main, index, mode) {
      const centerText = mode === "analogous" ? "請找出<br>2 個類似色" : "請找出<br>正對比色";

      return `
        <div class="mini-wheel-wrap">
          <div class="mini-wheel" data-round="${index}" data-main="${main}" data-mode="${mode}">
            ${colors.map((c, i) => wheelNode(c, i, main, index, mode)).join("")}
            <div class="wheel-center">${centerText}</div>
          </div>
        </div>
      `;
    }

    function wheelNode(color, i, main, round, mode) {
      const angle = -90 + i * 30;
      const isMain = color.id === main;
      // 所有色卡固定在同一圈，避免題目色外移後壓到相鄰色。
      const radius = 40;
      const x = 50 + radius * Math.cos(angle * Math.PI / 180);
      const y = 50 + radius * Math.sin(angle * Math.PI / 180);
      const handler = mode === "analogous" ? "toggleAnalogousWheelSelection(this, 2)" : "selectContrastWheel(this)";

      return `
        <button
          type="button"
          class="wheel-node ${isMain ? "main-target" : ""}"
          data-color="${color.id}"
          data-round="${round}"
          data-mode="${mode}"
          style="left:${x}%; top:${y}%; background:${color.hex};"
          onclick="${isMain ? "" : handler}"
          ${isMain ? "disabled" : ""}
          aria-label="${color.name}"
          title="${color.name}"
        >${color.name}</button>
      `;
    }

    function renderAnalogous() {
      const rounds = pickRandomColorIds(3).map(id => ({ main: id }));

      panel.innerHTML = `
        <div class="section-title">
          <div class="badge">5</div>
          <h2>類似色：色相環＋同色系</h2>
        </div>
        <div class="hint">
          <strong>類似色定義：</strong>類似色是色相環上位置相近的顏色，通常看起來比較和諧、柔和、有連續感。<br>
          在這一關中，類似色包含兩種：<strong>色相環上左右相鄰的顏色</strong>，以及<strong>同色系的深淺變化</strong>。<br>
          題目會隨機出現。先在色相環上找出 <strong>2 個相鄰的類似色</strong>，再到下方 5 個同色系選項中，找出 <strong>2 個正確答案</strong>。
        </div>

        ${rounds.map((r, i) => analogousRound(r.main, i)).join("")}

        <div class="actions">
          <button class="primary" onclick="checkAnalogous()">檢查類似色</button>
          <button class="secondary" onclick="renderAnalogous()">重新挑戰</button>
          <button id="nextBtn" class="ghost" onclick="goNext()" ${completed[4] ? "" : "disabled"}>前往下一小節</button>
        </div>
        <div class="feedback"></div>
      `;
    }

    function analogousRound(main, index) {
      const shadeOptions = getAnalogousShadeOptions(main);
      return `
        <div class="quiz-round" data-round="${index}" data-main="${main}">
          <div class="wheel-round-layout">
            <div class="question">第 ${index + 1} 題：請找出 <strong>${colorName(main)}</strong> 的類似色。</div>
            ${wheelQuestion(main, index, "analogous")}

            <div class="mini-card" style="margin-top:10px;">
              <div class="question" style="font-size:16px;">下面 5 個同色系選項中，請選出 2 個屬於 <strong>${colorName(main)}</strong> 的類似色變化：</div>
              <div class="choice-row">
                ${shadeOptions.map(v => `<button class="color-choice analogous-extra" data-color="${v.id}" data-round="${index}" style="background:${v.hex};" onclick="toggleAnalogousExtra(this, 2)">${v.name}</button>`).join("")}
              </div>
            </div>

            <div class="round-tip">先找左右相鄰的兩色，再找出同色系深淺變化的兩色。</div>
          </div>
        </div>
      `;
    }

    window.toggleAnalogousWheelSelection = function(btn, limit) {
      const round = btn.dataset.round;
      const selected = document.querySelectorAll(`.wheel-node.selected[data-round="${round}"][data-mode="analogous"]`);
      if (btn.classList.contains("selected")) {
        btn.classList.remove("selected");
      } else {
        if (selected.length >= limit) return;
        btn.classList.add("selected");
      }
    };

    window.toggleAnalogousExtra = function(btn, limit) {
      const round = btn.dataset.round;
      const selected = document.querySelectorAll(`.analogous-extra.selected[data-round="${round}"]`);
      if (btn.classList.contains("selected")) {
        btn.classList.remove("selected");
      } else {
        if (selected.length >= limit) return;
        btn.classList.add("selected");
      }
    };

    window.checkAnalogous = function() {
      let wrongRounds = 0;

      document.querySelectorAll('.quiz-round[data-main]').forEach(round => {
        if (!round.querySelector('.analogous-extra') && !round.querySelector('.contrast-extra')) return;
      });

      document.querySelectorAll('.quiz-round').forEach(round => {
        const hasAnalogous = round.querySelector('.analogous-extra');
        if (!hasAnalogous) return;

        const main = round.dataset.main;
        const correctWheel = analogousMap[main].slice().sort().join(",");
        const selectedWheel = [...round.querySelectorAll('.wheel-node.selected[data-mode="analogous"]')].map(btn => btn.dataset.color).sort().join(",");

        const correctExtra = sameFamilyVariants(main).map(v => v.id).sort().join(",");
        const selectedExtra = [...round.querySelectorAll('.analogous-extra.selected')].map(btn => btn.dataset.color).sort().join(",");

        if (selectedWheel !== correctWheel || selectedExtra !== correctExtra) wrongRounds++;
      });

      const feedback = document.querySelector(".feedback");
      if (wrongRounds === 0) {
        passStep("類似色配對成功！你已經能同時判斷色相環上的類似色，以及同色系的深淺變化。");
      } else {
        feedback.className = "feedback bad";
        feedback.textContent = `還有 ${wrongRounds} 題需要修正。請確認：色相環上相鄰 2 色，以及下方同色系正確 2 色。`;
      }
    };

    function renderContrast() {
      const rounds = pickRandomColorIds(4).map(id => ({ main: id }));

      panel.innerHTML = `
        <div class="section-title">
          <div class="badge">6</div>
          <h2>對比色：正對比色＋延伸對比色</h2>
        </div>
        <div class="hint">
          <strong>對比色定義：</strong>對比色是色相環上距離較遠、位置相對的顏色，放在一起會產生強烈、醒目、跳出來的效果。<br>
          在這一關中，對比色包含兩種：<strong>色相環正對面的顏色</strong>，以及<strong>正對比色左右兩邊的延伸對比色</strong>。<br>
          題目會隨機出現。先在色相環上找出 <strong>1 個正對比色</strong>，再到下方 5 個選項中，選出 <strong>2 個延伸對比色</strong>。
        </div>

        ${rounds.map((r, i) => contrastRound(r.main, i)).join("")}

        <div class="actions">
          <button class="primary" onclick="checkContrast()">檢查對比色</button>
          <button class="secondary" onclick="renderContrast()">重新挑戰</button>
          <button id="nextBtn" class="ghost" onclick="goNext()" ${completed[5] ? "" : "disabled"}>完成第一區塊</button>
        </div>
        <div class="feedback"></div>
      `;
    }

    function contrastRound(main, index) {
      const extraOptions = getContrastExtraOptions(main);
      return `
        <div class="quiz-round" data-round="${index}" data-main="${main}">
          <div class="wheel-round-layout">
            <div class="question">第 ${index + 1} 題：請在色相環上找出 <strong>${colorName(main)}</strong> 的正對比色。</div>
            ${wheelQuestion(main, index, "contrast")}

            <div class="mini-card" style="margin-top:10px;">
              <div class="question" style="font-size:16px;">選出上方的正對比色後，請在下面 5 個選項中，再找出 2 個延伸對比色：</div>
              <div class="choice-row">
                ${extraOptions.map(v => `<button class="color-choice contrast-extra" data-color="${v.id}" data-round="${index}" style="background:${v.hex};" onclick="toggleContrastExtra(this, 2)">${v.name}</button>`).join("")}
              </div>
            </div>

            <div class="round-tip">先找正對面的顏色，再找出正對比色左右兩邊的兩色。</div>
          </div>
        </div>
      `;
    }

    window.selectContrastWheel = function(btn) {
      const round = btn.dataset.round;
      document.querySelectorAll(`.wheel-node[data-round="${round}"][data-mode="contrast"]`).forEach(node => {
        if (!node.classList.contains("main-target")) node.classList.remove("selected");
      });
      btn.classList.add("selected");
    };

    window.toggleContrastExtra = function(btn, limit) {
      const round = btn.dataset.round;
      const selected = document.querySelectorAll(`.contrast-extra.selected[data-round="${round}"]`);
      if (btn.classList.contains("selected")) {
        btn.classList.remove("selected");
      } else {
        if (selected.length >= limit) return;
        btn.classList.add("selected");
      }
    };

    window.checkContrast = function() {
      let wrongRounds = 0;

      document.querySelectorAll('.quiz-round').forEach(round => {
        const hasContrast = round.querySelector('.contrast-extra');
        if (!hasContrast) return;

        const main = round.dataset.main;
        const correctWheel = contrastMap[main];
        const selectedWheel = round.querySelector('.wheel-node.selected[data-mode="contrast"]')?.dataset.color || "";

        const correctExtra = analogousMap[contrastMap[main]].slice().sort().join(",");
        const selectedExtra = [...round.querySelectorAll('.contrast-extra.selected')].map(btn => btn.dataset.color).sort().join(",");

        if (selectedWheel !== correctWheel || selectedExtra !== correctExtra) wrongRounds++;
      });

      const feedback = document.querySelector(".feedback");
      if (wrongRounds === 0) {
        passStep("對比色挑戰成功！你已經掌握正對比色，以及正對比色左右兩邊的延伸對比色。");
      } else {
        feedback.className = "feedback bad";
        feedback.textContent = `還有 ${wrongRounds} 題需要修正。請確認：色相環上的正對比色 1 個，以及下方延伸對比色 2 個。`;
      }
    };

    function renderFinish() {
      renderTabs();
      panel.innerHTML = `
        <div class="unified-ending finish">
          <div class="unified-kicker">✦ MISSION CLEAR ✦</div>
          <h2 class="unified-title">第一道封印｜色相<br>解鎖成功</h2>
          <p class="unified-message">
            你已完成「色相定義、調色實驗室、CMY 12色相環、色系、類似色、對比色」六個任務，<br>
            第一把色彩鑰匙正式入手！
          </p>
          <div class="unified-stamp">第一道封印解除</div>
          <div class="unified-password-box">
            <div class="unified-password-label">恭喜獲得開鎖密碼</div>
            <div class="unified-password">HUE</div>
            <div class="unified-note">請記下密碼，完成學習驗收後再前往下一道封印。</div>
          </div>
          <div class="unified-actions actions">
            <button class="ghost" onclick="currentStep=0; render()">回到第一小節複習</button>
            <button class="secondary" onclick="resetAll()">重新開始</button>
          </div>
        </div>
      `;
    }

    let lastTapTime = 0;
    let lastTapElement = null;

    document.addEventListener("touchend", function(event) {
      const chip = event.target.closest(".slot .color-chip");
      if (!chip) return;
      const now = Date.now();
      if (lastTapElement === chip && now - lastTapTime < 420) {
        event.preventDefault();
        returnSlotColorToBank(chip.closest(".slot"));
        lastTapElement = null;
        lastTapTime = 0;
      } else {
        lastTapElement = chip;
        lastTapTime = now;
      }
    }, { passive: false });

    window.resetAll = function() {
      currentStep = 0;
      unlockedStep = 0;
      completed = [false, false, false, false, false, false];
      mixMissionIndex = 0;
      mixDrops = { Y: 0, M: 0, C: 0 };
      mixMissions = createMixMissions();
      render();
    };

    render();
  </script>
<style>
  .hue-password-button {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 9999;
    display: none;
    min-height: 72px;
    border: 0;
    border-radius: 999px;
    padding: 18px 34px;
    background: #ff9f1c;
    color: #17120a;
    font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    font-size: 24px;
    font-weight: 900;
    text-decoration: none;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.24);
  }

  .hue-password-button.is-ready {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
</style>
<a class="hue-password-button" href="hue-password.html">學習驗收</a>
<script>
  (() => {
    const passwordButton = document.querySelector(".hue-password-button");
    if (!passwordButton) return;

    function shouldShowPasswordButton() {
      const visibleText = document.body.innerText || "";
      const compactText = visibleText.replace(/\s/g, "");
      return compactText.includes("開鎖密碼");
    }

    function updatePasswordButton() {
      passwordButton.classList.toggle("is-ready", shouldShowPasswordButton());
    }

    updatePasswordButton();
    window.addEventListener("load", updatePasswordButton);
    document.addEventListener("click", () => window.setTimeout(updatePasswordButton, 80));
    document.addEventListener("change", () => window.setTimeout(updatePasswordButton, 80));

    const observer = new MutationObserver(updatePasswordButton);
    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true,
      attributes: true,
      attributeFilter: ["class", "style", "disabled", "hidden"]
    });
  })();
</script>
  <script src="game-timer.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>明度開場</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background: #070b1d;
    }

    main {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #070b1d;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #070b1d;
    }

    .next-button {
      position: fixed;
      left: 50%;
      bottom: clamp(18px, 5vh, 46px);
      transform: translateX(-50%);
      display: grid;
      width: 70px;
      height: 70px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 211, 79, 0.92);
      color: #17120a;
      cursor: pointer;
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.28);
      animation: float 1.4s ease-in-out infinite;
    }

    .next-button:focus-visible {
      outline: 4px solid rgba(255, 255, 255, 0.9);
      outline-offset: 5px;
    }

    @keyframes float {
      0%,
      100% {
        transform: translate(-50%, 0);
      }

      50% {
        transform: translate(-50%, 8px);
      }
    }

    @media (max-width: 640px) {
      .next-button {
        width: 58px;
        height: 58px;
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <main aria-label="明度開場">
    <img src="色彩學開場影片/明度01.png" alt="明度開場">
    <a class="next-button" href="index02.html" aria-label="往下進入明度任務">↓</a>
  </main>
  <script src="game-timer.js"></script>
</body>
</html>

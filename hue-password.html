<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>色相密碼解封</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 213, 79, 0.24), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(58, 182, 255, 0.2), transparent 24%),
        linear-gradient(135deg, #fff8df 0%, #e9f7ff 48%, #fff2f6 100%);
      color: #10214a;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 48px);
      color: #113477;
      letter-spacing: 0;
    }

    .stage-label {
      border-radius: 999px;
      padding: 10px 18px;
      background: #113477;
      color: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .panel {
      display: grid;
      gap: 20px;
      padding: clamp(18px, 3vw, 28px);
      border: 3px solid #2b61c7;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 16px 38px rgba(16, 33, 74, 0.14);
    }

    .reward-layout,
    .challenge-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 24px;
      align-items: center;
    }

    .reward-image,
    .challenge-image {
      width: 100%;
      max-height: 68vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(16, 33, 74, 0.12);
    }

    .control-panel {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .prompt {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.5;
    }

    .hint {
      color: #405177;
      font-size: 16px;
      line-height: 1.6;
    }

    input {
      width: 100%;
      min-height: 56px;
      border: 2px solid #7aa3ec;
      border-radius: 8px;
      padding: 12px 14px;
      color: #10214a;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
      background: #fff;
    }

    input:focus {
      outline: 4px solid rgba(255, 203, 69, 0.42);
      border-color: #ff9f1c;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button,
    .link-button {
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      background: #ff9f1c;
      color: #17120a;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
      text-align: center;
      line-height: 1.35;
      box-shadow: 0 8px 18px rgba(16, 33, 74, 0.16);
    }

    .secondary {
      border: 2px solid #2b61c7;
      background: #fff;
      color: #113477;
      box-shadow: none;
    }

    .message {
      min-height: 32px;
      font-size: 18px;
      font-weight: 900;
      color: #113477;
    }

    .success {
      color: #14843b;
    }

    .error {
      color: #c62828;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 20px, 620px);
      }

      .topbar,
      .reward-layout,
      .challenge-layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: start;
      }

      .stage-label {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>色相密碼解封</h1>
      <div id="stageLabel" class="stage-label">獲得色相</div>
    </div>

    <section id="rewardPanel" class="panel">
      <div class="reward-layout">
        <img class="reward-image" src="色彩學開場影片/色相通關.png" alt="色相通關圖片">
        <div class="control-panel">
          <p class="prompt">你已完成第一段任務，獲得「色相」線索。</p>
          <p class="hint">按下按鈕後，系統會隨機抽出第一道色相驗證圖片。</p>
          <button id="getPasswordButton" type="button">學習驗收</button>
        </div>
      </div>
    </section>

    <section id="challengePanel" class="panel hidden">
      <div class="challenge-layout">
        <img id="challengeImage" class="challenge-image" src="" alt="色相驗證題目">
        <div class="control-panel">
          <h2 id="challengeTitle">第一道封印</h2>
          <p id="challengePrompt" class="prompt">請輸入這張圖片對應的答案。</p>
          <button id="passwordHintButton" class="secondary" type="button" onclick="window.alert('開鎖密碼：HUE')">查看開鎖密碼</button>
          <input id="answerInput" type="text" autocomplete="off" inputmode="text" aria-label="輸入答案">
          <div class="button-row">
            <button id="submitAnswerButton" type="button">確認解封</button>
          </div>
          <p id="message" class="message" aria-live="polite"></p>
          <a id="finishButton" class="link-button hidden" href="brightness-intro.html">恭喜您確實解開色相封印</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const part1Questions = [
      { image: "解謎圖片/色相/part1/色相驗證 (1).png", answers: ["HUE+P4", "P4", "紅", "獲得線索+P4", "獲得線索P4"] },
      { image: "解謎圖片/色相/part1/色相驗證 (2).png", answers: ["HUE+D8", "D8", "綠", "獲得線索+D8", "獲得線索D8"] },
      { image: "解謎圖片/色相/part1/色相驗證 (3).png", answers: ["HUE+F8", "F8", "藍", "獲得線索+F8", "獲得線索F8"] },
      { image: "解謎圖片/色相/part1/色相驗證 (4).png", answers: ["HUE+K3", "K3", "紫", "獲得線索+K3", "獲得線索K3"] },
      { image: "解謎圖片/色相/part1/色相驗證 (5).png", answers: ["HUE+D7", "D7", "藍", "獲得線索+D7", "獲得線索D7"] },
      { image: "解謎圖片/色相/part1/色相驗證 (6).png", answers: ["HUE+F5", "F5", "黃橙", "獲得線索+F5", "獲得線索F5"] },
      { image: "解謎圖片/色相/part1/色相驗證 (7).png", answers: ["HUE+L2", "L2", "紅紫", "獲得線索+L2", "獲得線索L2"] },
      { image: "解謎圖片/色相/part1/色相驗證 (8).png", answers: ["HUE+H7", "H7", "藍綠", "獲得線索+H7", "獲得線索H7"] },
      { image: "解謎圖片/色相/part1/色相驗證 (9).png", answers: ["HUE+L10", "L10", "黃綠", "獲得線索+L10", "獲得線索L10"] }
    ];

    const part2Questions = [
      { image: "解謎圖片/色相/part2/色相1(11-2-3-2).png", answers: ["11-2-3-2", "11232"] },
      { image: "解謎圖片/色相/part2/色相2(12-3-1-10).png", answers: ["12-3-1-10", "123110"] },
      { image: "解謎圖片/色相/part2/色相3(10-11-6-4).png", answers: ["10-11-6-4", "101164"] },
      { image: "解謎圖片/色相/part2/色相4(7-9-5-5).png", answers: ["7-9-5-5", "7955"] },
      { image: "解謎圖片/色相/part2/色相5(9-10-8-11).png", answers: ["9-10-8-11", "910811"] },
      { image: "解謎圖片/色相/part2/色相6(4-1-12-6).png", answers: ["4-1-12-6", "41126"] },
      { image: "解謎圖片/色相/part2/色相7(5-5-7-8).png", answers: ["5-5-7-8", "5578"] },
      { image: "解謎圖片/色相/part2/色相8(2-4-6-9).png", answers: ["2-4-6-9", "2469"] },
      { image: "解謎圖片/色相/part2/色相9(3-12-10-12).png", answers: ["3-12-10-12", "3121012"] }
    ];

    const rewardPanel = document.querySelector("#rewardPanel");
    const challengePanel = document.querySelector("#challengePanel");
    const stageLabel = document.querySelector("#stageLabel");
    const getPasswordButton = document.querySelector("#getPasswordButton");
    const challengeImage = document.querySelector("#challengeImage");
    const challengeTitle = document.querySelector("#challengeTitle");
    const challengePrompt = document.querySelector("#challengePrompt");
    const answerInput = document.querySelector("#answerInput");
    const submitAnswerButton = document.querySelector("#submitAnswerButton");
    const passwordHintButton = document.querySelector("#passwordHintButton");
    const finishButton = document.querySelector("#finishButton");
    const message = document.querySelector("#message");

    let stage = 1;
    let currentQuestion = null;

    function getStorageKey() {
      return stage === 1 ? "lastHuePart1Question" : "lastHuePart2Question";
    }

    function getQuestionId(question) {
      return question.image;
    }

    function normalizeAnswer(value) {
      return value
        .trim()
        .toUpperCase()
        .replace(/\s/g, "")
        .replace(/＋/g, "+")
        .replace(/—|–|－/g, "-");
    }

    function pickQuestion() {
      const list = stage === 1 ? part1Questions : part2Questions;
      const storageKey = getStorageKey();
      const lastQuestionId = window.localStorage.getItem(storageKey);
      const candidates = list.filter((question) => getQuestionId(question) !== lastQuestionId);
      const pool = candidates.length ? candidates : list;
      currentQuestion = pool[Math.floor(Math.random() * pool.length)];
      window.localStorage.setItem(storageKey, getQuestionId(currentQuestion));
      challengeImage.src = currentQuestion.image;
      answerInput.value = "";
      message.textContent = "";
      message.className = "message";
      finishButton.classList.add("hidden");
      challengeTitle.textContent = stage === 1 ? "第一道封印：色相驗證" : "第二道封印：色相密碼鎖";
      challengePrompt.textContent = stage === 1
        ? "請依照圖示，輸入正確答案（線索就是前面你獲得的答案）。"
        : "請輸入這張圖片對應的四格色相密碼。";
      stageLabel.textContent = stage === 1 ? "Part 1" : "Part 2";
      passwordHintButton.classList.toggle("hidden", stage !== 1);
      answerInput.focus();
    }

    function startChallenge() {
      rewardPanel.classList.add("hidden");
      challengePanel.classList.remove("hidden");
      stage = 1;
      pickQuestion();
    }

    function checkAnswer() {
      const value = normalizeAnswer(answerInput.value);
      const accepted = currentQuestion.answers.map(normalizeAnswer);

      if (!value) {
        message.textContent = "請先輸入答案。";
        message.className = "message error";
        answerInput.focus();
        return;
      }

      if (!accepted.includes(value)) {
        message.textContent = "還沒有解封成功，請再對照圖片線索。";
        message.className = "message error";
        answerInput.select();
        return;
      }

      if (stage === 1) {
        message.textContent = "第一道封印解除，進入色相密碼鎖。";
        message.className = "message success";
        stage = 2;
        window.setTimeout(pickQuestion, 900);
        return;
      }

      message.textContent = "色相密碼解封成功。";
      message.className = "message success";
      finishButton.classList.remove("hidden");
      finishButton.focus();
    }

    getPasswordButton.addEventListener("click", startChallenge);
    submitAnswerButton.addEventListener("click", checkAnswer);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });
  </script>
</body>
</html>

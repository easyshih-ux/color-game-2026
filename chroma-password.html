<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>彩度密碼解封</title>
  <style>
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background: linear-gradient(135deg, #fff8df 0%, #eef8ff 52%, #fff0f4 100%);
      color: #10214a;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1, h2, p { margin: 0; }

    h1 {
      font-size: clamp(28px, 4vw, 48px);
      color: #113477;
      letter-spacing: 0;
    }

    .stage-label {
      border-radius: 999px;
      padding: 10px 18px;
      background: #113477;
      color: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .panel {
      display: grid;
      gap: 20px;
      padding: clamp(18px, 3vw, 28px);
      border: 3px solid #2b61c7;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 16px 38px rgba(16, 33, 74, 0.14);
    }

    .reward-layout,
    .challenge-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 24px;
      align-items: center;
    }

    .reward-image,
    .challenge-image {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(16, 33, 74, 0.12);
    }

    .control-panel {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .prompt {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.5;
    }

    input {
      width: 100%;
      min-height: 56px;
      border: 2px solid #7aa3ec;
      border-radius: 8px;
      padding: 12px 14px;
      color: #10214a;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
      background: #fff;
    }

    input:focus {
      outline: 4px solid rgba(255, 203, 69, 0.42);
      border-color: #ff9f1c;
    }

    button,
    .link-button {
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      background: #ff9f1c;
      color: #17120a;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 8px 18px rgba(16, 33, 74, 0.16);
    }

    .secondary {
      border: 2px solid #2b61c7;
      background: #fff;
      color: #113477;
      box-shadow: none;
    }

    .message {
      min-height: 32px;
      font-size: 18px;
      font-weight: 900;
      color: #113477;
    }

    .success { color: #14843b; }
    .error { color: #c62828; }
    .hidden { display: none; }

    @media (max-width: 820px) {
      main { width: min(100% - 20px, 620px); }
      .topbar,
      .reward-layout,
      .challenge-layout { grid-template-columns: 1fr; }
      .topbar { align-items: start; }
      .stage-label { width: fit-content; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>彩度密碼解封</h1>
      <div id="stageLabel" class="stage-label">獲得彩度</div>
    </div>

    <section id="rewardPanel" class="panel">
      <div class="reward-layout">
        <img class="reward-image" src="色彩學開場影片/彩度通關.png" alt="彩度通關圖片">
        <div class="control-panel">
          <p class="prompt">你已完成第三段任務，獲得「彩度」線索。</p>
          <p>按下按鈕後，系統會隨機抽出第一道彩度驗收圖片。</p>
          <button id="startChallengeButton" type="button">學習驗收</button>
        </div>
      </div>
    </section>

    <section id="challengePanel" class="panel hidden">
      <div class="challenge-layout">
        <img id="challengeImage" class="challenge-image" src="" alt="彩度驗收題目">
        <div class="control-panel">
          <h2 id="challengeTitle">第三道封印：彩度驗收</h2>
          <p id="challengePrompt" class="prompt">請依照圖示，輸入正確答案（線索就是前面你獲得的答案）。</p>
          <button id="passwordHintButton" class="secondary" type="button" onclick="window.alert('開鎖密碼：Chroma')">查看開鎖密碼</button>
          <input id="answerInput" type="text" autocomplete="off" inputmode="text" aria-label="輸入答案">
          <button id="submitAnswerButton" type="button">確認解封</button>
          <p id="message" class="message" aria-live="polite"></p>
          <a id="finishButton" class="link-button hidden" href="elements-intro.html">恭喜您確實解開彩度封印</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const part1Questions = [
      { image: "解謎圖片/彩度/part1/彩度驗收 (1).png", answers: ["Chroma+C8"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (2).png", answers: ["Chroma+F11"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (3).png", answers: ["Chroma+Q6"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (4).png", answers: ["Chroma+K11"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (5).png", answers: ["Chroma+R6"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (6).png", answers: ["Chroma+B12"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (7).png", answers: ["Chroma+T12"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (8).png", answers: ["Chroma+K10"] },
      { image: "解謎圖片/彩度/part1/彩度驗收 (9).png", answers: ["Chroma+W4"] }
    ];

    const part2Questions = [
      { image: "解謎圖片/彩度/Part2/彩度1(雲霞).png", answers: ["雲霞"] },
      { image: "解謎圖片/彩度/Part2/彩度2(花火).png", answers: ["花火"] },
      { image: "解謎圖片/彩度/Part2/彩度3(月影).png", answers: ["月影"] },
      { image: "解謎圖片/彩度/Part2/彩度4(春潮).png", answers: ["春潮"] },
      { image: "解謎圖片/彩度/Part2/彩度5(雪光).png", answers: ["雪光"] },
      { image: "解謎圖片/彩度/Part2/彩度6(星河).png", answers: ["星河"] },
      { image: "解謎圖片/彩度/Part2/彩度7(晨霧).png", answers: ["晨霧"] },
      { image: "解謎圖片/彩度/Part2/彩度8(森海).png", answers: ["森海"] },
      { image: "解謎圖片/彩度/Part2/彩度9(竹影).png", answers: ["竹影"] }
    ];

    const stageLabel = document.querySelector("#stageLabel");
    const rewardPanel = document.querySelector("#rewardPanel");
    const challengePanel = document.querySelector("#challengePanel");
    const startChallengeButton = document.querySelector("#startChallengeButton");
    const challengeImage = document.querySelector("#challengeImage");
    const challengeTitle = document.querySelector("#challengeTitle");
    const challengePrompt = document.querySelector("#challengePrompt");
    const answerInput = document.querySelector("#answerInput");
    const submitAnswerButton = document.querySelector("#submitAnswerButton");
    const passwordHintButton = document.querySelector("#passwordHintButton");
    const finishButton = document.querySelector("#finishButton");
    const message = document.querySelector("#message");

    let stage = 1;
    let currentQuestion = null;

    function normalizeAnswer(value) {
      return value.trim().toUpperCase().replace(/\s/g, "").replace(/＋/g, "+").replace(/—|–|－/g, "-").replace(/[，。,.、]/g, "");
    }

    function getStorageKey() {
      return stage === 1 ? "lastChromaPart1Question" : "lastChromaPart2Question";
    }

    function pickQuestion() {
      const list = stage === 1 ? part1Questions : part2Questions;
      const storageKey = getStorageKey();
      const lastQuestionId = window.localStorage.getItem(storageKey);
      const candidates = list.filter((question) => question.image !== lastQuestionId);
      const pool = candidates.length ? candidates : list;
      currentQuestion = pool[Math.floor(Math.random() * pool.length)];
      window.localStorage.setItem(storageKey, currentQuestion.image);

      challengeImage.src = currentQuestion.image;
      answerInput.value = "";
      message.textContent = "";
      message.className = "message";
      finishButton.classList.add("hidden");
      challengeTitle.textContent = stage === 1 ? "第三道封印：彩度驗收" : "第三道封印：彩度密碼鎖";
      challengePrompt.textContent = stage === 1
        ? "請依照圖示，輸入正確答案（線索就是前面你獲得的答案）。"
        : "請依照圖示，輸入這張圖片對應的正確答案。";
      stageLabel.textContent = stage === 1 ? "Part 1" : "Part 2";
      passwordHintButton.classList.toggle("hidden", stage !== 1);
      answerInput.focus();
    }

    function startChallenge() {
      rewardPanel.classList.add("hidden");
      challengePanel.classList.remove("hidden");
      stage = 1;
      pickQuestion();
    }

    function checkAnswer() {
      const value = normalizeAnswer(answerInput.value);
      const accepted = currentQuestion.answers.map(normalizeAnswer);

      if (!value) {
        message.textContent = "請先輸入答案。";
        message.className = "message error";
        answerInput.focus();
        return;
      }

      if (!accepted.includes(value)) {
        message.textContent = "還沒有解封成功，請再對照圖片線索。";
        message.className = "message error";
        answerInput.select();
        return;
      }

      if (stage === 1) {
        message.textContent = "第一段彩度驗收成功，進入彩度密碼鎖。";
        message.className = "message success";
        stage = 2;
        window.setTimeout(pickQuestion, 900);
        return;
      }

      message.textContent = "彩度密碼解封成功。";
      message.className = "message success";
      finishButton.classList.remove("hidden");
      finishButton.focus();
    }

    startChallengeButton.addEventListener("click", startChallenge);
    submitAnswerButton.addEventListener("click", checkAnswer);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") checkAnswer();
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>明度密碼解封</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 213, 79, 0.22), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(90, 125, 180, 0.18), transparent 24%),
        linear-gradient(135deg, #f9fbff 0%, #fff8df 48%, #eef5ff 100%);
      color: #10214a;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 48px);
      color: #113477;
      letter-spacing: 0;
    }

    .stage-label {
      border-radius: 999px;
      padding: 10px 18px;
      background: #113477;
      color: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    .panel {
      display: grid;
      gap: 20px;
      padding: clamp(18px, 3vw, 28px);
      border: 3px solid #2b61c7;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 16px 38px rgba(16, 33, 74, 0.14);
    }

    .reward-layout,
    .challenge-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 24px;
      align-items: center;
    }

    .reward-image,
    .challenge-image {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(16, 33, 74, 0.12);
    }

    .control-panel {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .prompt {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.5;
    }

    input {
      width: 100%;
      min-height: 56px;
      border: 2px solid #7aa3ec;
      border-radius: 8px;
      padding: 12px 14px;
      color: #10214a;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
      background: #fff;
    }

    input:focus {
      outline: 4px solid rgba(255, 203, 69, 0.42);
      border-color: #ff9f1c;
    }

    button,
    .link-button {
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      background: #ff9f1c;
      color: #17120a;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 8px 18px rgba(16, 33, 74, 0.16);
    }

    .secondary {
      border: 2px solid #2b61c7;
      background: #fff;
      color: #113477;
      box-shadow: none;
    }

    .message {
      min-height: 32px;
      font-size: 18px;
      font-weight: 900;
      color: #113477;
    }

    .success {
      color: #14843b;
    }

    .error {
      color: #c62828;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 20px, 620px);
      }

      .topbar,
      .challenge-layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: start;
      }

      .stage-label {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>明度密碼解封</h1>
      <div id="stageLabel" class="stage-label">獲得明度</div>
    </div>

    <section id="rewardPanel" class="panel">
      <div class="reward-layout">
        <img class="reward-image" src="色彩學開場影片/明度通關.png" alt="明度通關圖片">
        <div class="control-panel">
          <p class="prompt">你已完成第二段任務，獲得「明度」線索。</p>
          <p>按下按鈕後，系統會隨機抽出第一道明度驗證圖片。</p>
          <button id="startChallengeButton" type="button">學習驗收</button>
        </div>
      </div>
    </section>

    <section id="challengePanel" class="panel hidden">
      <div class="challenge-layout">
        <img id="challengeImage" class="challenge-image" src="" alt="明度驗證題目">
        <div class="control-panel">
          <h2 id="challengeTitle">第二道封印：明度驗證</h2>
          <p id="challengePrompt" class="prompt">請依照圖示，輸入正確答案（線索就是前面你獲得的答案）。</p>
          <button id="passwordHintButton" class="secondary" type="button" onclick="window.alert('開鎖密碼：VALUE')">查看開鎖密碼</button>
          <input id="answerInput" type="text" autocomplete="off" inputmode="text" aria-label="輸入答案">
          <button id="submitAnswerButton" type="button">確認解封</button>
          <p id="message" class="message" aria-live="polite"></p>
          <a id="finishButton" class="link-button hidden" href="chroma-intro.html">恭喜您確實解開明度封印</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const part1Questions = [
      { image: "解謎圖片/明度/part1/明度驗證 (1).png", answers: ["VALUE+V7"] },
      { image: "解謎圖片/明度/part1/明度驗證 (2).png", answers: ["VALUE+G12"] },
      { image: "解謎圖片/明度/part1/明度驗證 (3).png", answers: ["VALUE+N6"] },
      { image: "解謎圖片/明度/part1/明度驗證 (4).png", answers: ["VALUE+C9"] },
      { image: "解謎圖片/明度/part1/明度驗證 (5).png", answers: ["VALUE+P3"] },
      { image: "解謎圖片/明度/part1/明度驗證 (6).png", answers: ["VALUE+H8"] },
      { image: "解謎圖片/明度/part1/明度驗證 (7).png", answers: ["VALUE+K7"] },
      { image: "解謎圖片/明度/part1/明度驗證 (8).png", answers: ["VALUE+T11"] },
      { image: "解謎圖片/明度/part1/明度驗證 (9).png", answers: ["VALUE+R5"] }
    ];

    const part2Questions = [
      { image: "解謎圖片/明度/Part2/明度 (1).png", answers: ["白蘋吹盡楚江秋"] },
      { image: "解謎圖片/明度/Part2/明度 (2).png", answers: ["雲破月來花弄影"] },
      { image: "解謎圖片/明度/Part2/明度 (3).png", answers: ["疏影橫斜水清淺"] },
      { image: "解謎圖片/明度/Part2/明度 (4).png", answers: ["鳥下綠蕪秦苑夕"] },
      { image: "解謎圖片/明度/Part2/明度 (5).png", answers: ["蟬鳴黃葉漢宮秋"] },
      { image: "解謎圖片/明度/Part2/明度 (6).png", answers: ["一川星斗爛無數"] },
      { image: "解謎圖片/明度/Part2/明度 (7).png", answers: ["惟有幽人自來去"] },
      { image: "解謎圖片/明度/Part2/明度 (8).png", answers: ["雪擁藍關馬不前"] },
      { image: "解謎圖片/明度/Part2/明度 (9).png", answers: ["無邊絲雨細如愁"] }
    ];

    const stageLabel = document.querySelector("#stageLabel");
    const rewardPanel = document.querySelector("#rewardPanel");
    const challengePanel = document.querySelector("#challengePanel");
    const startChallengeButton = document.querySelector("#startChallengeButton");
    const challengeImage = document.querySelector("#challengeImage");
    const challengeTitle = document.querySelector("#challengeTitle");
    const challengePrompt = document.querySelector("#challengePrompt");
    const answerInput = document.querySelector("#answerInput");
    const submitAnswerButton = document.querySelector("#submitAnswerButton");
    const passwordHintButton = document.querySelector("#passwordHintButton");
    const finishButton = document.querySelector("#finishButton");
    const message = document.querySelector("#message");

    let stage = 1;
    let currentQuestion = null;

    function normalizeAnswer(value) {
      return value
        .trim()
        .toUpperCase()
        .replace(/\s/g, "")
        .replace(/＋/g, "+")
        .replace(/—|–|－/g, "-")
        .replace(/[，。,.、]/g, "");
    }

    function getStorageKey() {
      return stage === 1 ? "lastValuePart1Question" : "lastValuePart2Question";
    }

    function pickQuestion() {
      const list = stage === 1 ? part1Questions : part2Questions;
      const storageKey = getStorageKey();
      const lastQuestionId = window.localStorage.getItem(storageKey);
      const candidates = list.filter((question) => question.image !== lastQuestionId);
      const pool = candidates.length ? candidates : list;
      currentQuestion = pool[Math.floor(Math.random() * pool.length)];
      window.localStorage.setItem(storageKey, currentQuestion.image);

      challengeImage.src = currentQuestion.image;
      answerInput.value = "";
      message.textContent = "";
      message.className = "message";
      finishButton.classList.add("hidden");
      challengeTitle.textContent = stage === 1 ? "第二道封印：明度驗證" : "第二道封印：明度密碼鎖";
      challengePrompt.textContent = stage === 1
        ? "請依照圖示，輸入正確答案（線索就是前面你獲得的答案）。"
        : "請依照圖示，輸入這張圖片對應的正確答案。";
      stageLabel.textContent = stage === 1 ? "Part 1" : "Part 2";
      passwordHintButton.classList.toggle("hidden", stage !== 1);
      answerInput.focus();
    }

    function startChallenge() {
      rewardPanel.classList.add("hidden");
      challengePanel.classList.remove("hidden");
      stage = 1;
      pickQuestion();
    }

    function checkAnswer() {
      const value = normalizeAnswer(answerInput.value);
      const accepted = currentQuestion.answers.map(normalizeAnswer);

      if (!value) {
        message.textContent = "請先輸入答案。";
        message.className = "message error";
        answerInput.focus();
        return;
      }

      if (!accepted.includes(value)) {
        message.textContent = "還沒有解封成功，請再對照圖片線索。";
        message.className = "message error";
        answerInput.select();
        return;
      }

      if (stage === 1) {
        message.textContent = "第一段明度驗證成功，進入明度密碼鎖。";
        message.className = "message success";
        stage = 2;
        window.setTimeout(pickQuestion, 900);
        return;
      }

      message.textContent = "明度密碼解封成功。";
      message.className = "message success";
      finishButton.classList.remove("hidden");
      finishButton.focus();
    }

    startChallengeButton.addEventListener("click", startChallenge);
    submitAnswerButton.addEventListener("click", checkAnswer);
    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    const requestedStage = Number(new URLSearchParams(window.location.search).get("stage"));
    if (requestedStage === 1 || requestedStage === 2) {
      rewardPanel.classList.add("hidden");
      challengePanel.classList.remove("hidden");
      stage = requestedStage;
      pickQuestion();
    }

  </script>
  <script src="game-timer.js"></script>
</body>
</html>
